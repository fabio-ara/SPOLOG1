<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="264" height="767.64" viewBox="0 0 264 767.64">
  <defs>
    <pattern id="drawio-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e5e5e5" stroke-width="1" />
    </pattern>
