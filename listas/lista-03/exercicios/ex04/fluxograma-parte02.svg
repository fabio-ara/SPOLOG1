    <path d="M 54 258.14 L 206.25 258.14 Q 240 258.14 240 291.89 Q 240 325.64 206.25 325.64 L 54 325.64 L 24 291.89 Z" />
    <path d="M 54 362.64 L 206.25 362.64 Q 240 362.64 240 396.39 Q 240 430.14 206.25 430.14 L 54 430.14 L 24 396.39 Z" />
    <path d="M 54 467.14 L 206.25 467.14 Q 240 467.14 240 500.89 Q 240 534.64 206.25 534.64 L 54 534.64 L 24 500.89 Z" />
