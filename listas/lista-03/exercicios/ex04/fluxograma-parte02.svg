  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="132" y="73.09" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">valor_com_desconto &lt;-</tspan>
      <tspan x="132" dy="14">valor_a_pagar -</tspan>
      <tspan x="132" dy="14">(valor_a_pagar * 8 / 100)</tspan>
    </text>
    <text x="132" y="177.59" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">valor_com_acrescimo &lt;-</tspan>
      <tspan x="132" dy="14">valor_a_pagar +</tspan>
      <tspan x="132" dy="14">(valor_a_pagar * 10 / 100)</tspan>
    </text>
    <text x="132" y="289.09" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">&quot;Valor de cada quilowatt:</tspan>
      <tspan x="132" dy="14">R$ &quot; + valor_quilowatt</tspan>
    </text>
    <text x="132" y="393.59" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">&quot;Valor a ser pago: R$ &quot; +</tspan>
      <tspan x="132" dy="14">valor_a_pagar</tspan>
    </text>
    <text x="132" y="491.09" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">&quot;Valor com desconto de 8%</tspan>
      <tspan x="132" dy="14">por pagamento antecipado:</tspan>
      <tspan x="132" dy="14">R$ &quot; + valor_com_desconto</tspan>
    </text>
    <text x="132" y="595.59" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">&quot;Valor com acréscimo de 10%</tspan>
      <tspan x="132" dy="14">por pagamento em atraso: R$</tspan>
      <tspan x="132" dy="14">&quot; + valor_com_acrescimo</tspan>
    </text>
    <text x="132" y="714.09" text-anchor="middle" font-size="12">
      <tspan x="132" dy="0">Fim</tspan>
    </text>
    <circle cx="132" cy="11" r="9" fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)" />
    <text x="132" y="15" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif">1</text>
