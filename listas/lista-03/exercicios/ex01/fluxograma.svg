<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="822" viewBox="0 0 240 822">
  <defs>
    <pattern id="drawio-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e5e5e5" stroke-width="1" />
    </pattern>
    <filter id="drawio-shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.22" />
    </filter>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff" />
  <rect x="0" y="0" width="100%" height="100%" fill="url(#drawio-grid)" />
  <g fill="none" stroke="#000000" stroke-width="1.5">
    <path d="M 120 84 L 120 126" marker-end="url(#arrow-end)" />
    <path d="M 120 186 L 120 237" marker-end="url(#arrow-end)" />
    <path d="M 120 288 L 120 330" marker-end="url(#arrow-end)" />
    <path d="M 120 390 L 120 432" marker-end="url(#arrow-end)" />
    <path d="M 120 492 L 120 534" marker-end="url(#arrow-end)" />
    <path d="M 120 594 L 120 636" marker-end="url(#arrow-end)" />
    <path d="M 120 696 L 120 738" marker-end="url(#arrow-end)" />
  </g>
  <g fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)">
    <rect x="24" y="24" width="192" height="60" rx="30" ry="30" />
    <path d="M 54 126 L 186 126 Q 216 126 216 156 Q 216 186 186 186 L 54 186 L 24 156 Z" />
    <polygon points="24,246 216,228 216,288 24,288" />
    <rect x="24" y="330" width="192" height="60" />
    <rect x="24" y="432" width="192" height="60" />
    <path d="M 54 534 L 186 534 Q 216 534 216 564 Q 216 594 186 594 L 54 594 L 24 564 Z" />
    <path d="M 54 636 L 186 636 Q 216 636 216 666 Q 216 696 186 696 L 54 696 L 24 666 Z" />
    <rect x="24" y="738" width="192" height="60" rx="30" ry="30" />
  </g>
  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="120" y="58.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">Início</tspan>
    </text>
    <text x="120" y="153.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">&quot;Informe peso da pessoa</tspan>
      <tspan x="120" dy="14">em quilogramas: &quot;</tspan>
    </text>
    <text x="120" y="262.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">peso_quilograma</tspan>
    </text>
    <text x="120" y="357.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">peso_gramas &lt;-</tspan>
      <tspan x="120" dy="14">peso_quilograma * 1000</tspan>
    </text>
    <text x="120" y="452.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">novo_peso_gramas &lt;-</tspan>
      <tspan x="120" dy="14">peso_gramas +</tspan>
      <tspan x="120" dy="14">(peso_gramas * 15 / 100)</tspan>
    </text>
    <text x="120" y="561.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">&quot;Peso da pessoa em</tspan>
      <tspan x="120" dy="14">gramas: &quot; + peso_gramas</tspan>
    </text>
    <text x="120" y="656.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">&quot;Novo peso em gramas</tspan>
      <tspan x="120" dy="14">com aumento de 15%: &quot; +</tspan>
      <tspan x="120" dy="14">novo_peso_gramas</tspan>
    </text>
    <text x="120" y="772.2" text-anchor="middle" font-size="12">
      <tspan x="120" dy="0">Fim</tspan>
    </text>
  </g>
</svg>
