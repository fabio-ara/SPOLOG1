<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="605" viewBox="0 0 256 605">
  <defs>
    <pattern id="drawio-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e5e5e5" stroke-width="1" />
    </pattern>
    <filter id="drawio-shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.22" />
    </filter>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff" />
  <rect x="0" y="0" width="100%" height="100%" fill="url(#drawio-grid)" />
  <g fill="none" stroke="#000000" stroke-width="1.5">
    <path d="M 128 23 L 128 48" marker-end="url(#arrow-end)" />
    <path d="M 128 113 L 128 165" marker-end="url(#arrow-end)" />
    <path d="M 128 230 L 128 282" marker-end="url(#arrow-end)" />
    <path d="M 128 347 L 128 399" marker-end="url(#arrow-end)" />
    <path d="M 128 464 L 128 516" marker-end="url(#arrow-end)" />
  </g>
  <g fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)">
    <rect x="24" y="48" width="208" height="65" />
    <rect x="24" y="165" width="208" height="65" />
    <path d="M 54 282 L 199.5 282 Q 232 282 232 314.5 Q 232 347 199.5 347 L 54 347 L 24 314.5 Z" />
    <path d="M 54 399 L 199.5 399 Q 232 399 232 431.5 Q 232 464 199.5 464 L 54 464 L 24 431.5 Z" />
    <rect x="24" y="516" width="208" height="65" rx="32.5" ry="32.5" />
  </g>
  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="128" y="63.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">litros_seca &lt;-</tspan>
      <tspan x="128" dy="14">quantidade_litros -</tspan>
      <tspan x="128" dy="14">(quantidade_litros *</tspan>
      <tspan x="128" dy="14">percentual_reducao)</tspan>
    </text>
    <text x="128" y="194.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">mililitros_seca &lt;-</tspan>
      <tspan x="128" dy="14">litros_seca * 1000</tspan>
    </text>
    <text x="128" y="304.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">&quot;Quantidade total em</tspan>
      <tspan x="128" dy="14">litros após aumento de</tspan>
      <tspan x="128" dy="14">34%: &quot; + litros_chuva</tspan>
    </text>
    <text x="128" y="421.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">&quot;Quantidade total em</tspan>
      <tspan x="128" dy="14">mililitros após redução de</tspan>
      <tspan x="128" dy="14">40%: &quot; + mililitros_seca</tspan>
    </text>
    <text x="128" y="552.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">Fim</tspan>
    </text>
    <circle cx="128" cy="11" r="9" fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)" />
    <text x="128" y="15" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif">1</text>
  </g>
</svg>
