<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="726" viewBox="0 0 256 726">
  <defs>
    <pattern id="drawio-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e5e5e5" stroke-width="1" />
    </pattern>
    <filter id="drawio-shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.22" />
    </filter>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff" />
  <rect x="0" y="0" width="100%" height="100%" fill="url(#drawio-grid)" />
  <g fill="none" stroke="#000000" stroke-width="1.5">
    <path d="M 128 89 L 128 141" marker-end="url(#arrow-end)" />
    <path d="M 128 206 L 128 267.75" marker-end="url(#arrow-end)" />
    <path d="M 128 323 L 128 375" marker-end="url(#arrow-end)" />
    <path d="M 128 440 L 128 492" marker-end="url(#arrow-end)" />
    <path d="M 128 557 L 128 609" marker-end="url(#arrow-end)" />
    <path d="M 128 674 L 128 703" marker-end="url(#arrow-end)" />
  </g>
  <g fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)">
    <rect x="24" y="24" width="208" height="65" rx="32.5" ry="32.5" />
    <path d="M 54 141 L 199.5 141 Q 232 141 232 173.5 Q 232 206 199.5 206 L 54 206 L 24 173.5 Z" />
    <polygon points="24,277.5 232,258 232,323 24,323" />
    <rect x="24" y="375" width="208" height="65" />
    <rect x="24" y="492" width="208" height="65" />
    <rect x="24" y="609" width="208" height="65" />
  </g>
  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="128" y="60.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">Início</tspan>
    </text>
    <text x="128" y="170.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">&quot;Informe quantidade de</tspan>
      <tspan x="128" dy="14">litros da represa: &quot;</tspan>
    </text>
    <text x="128" y="294.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">quantidade_litros</tspan>
    </text>
    <text x="128" y="411.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">percentual_aumento &lt;- 0.34</tspan>
    </text>
    <text x="128" y="528.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">percentual_reducao &lt;- 0.40</tspan>
    </text>
    <text x="128" y="624.7" text-anchor="middle" font-size="12">
      <tspan x="128" dy="0">litros_chuva &lt;-</tspan>
      <tspan x="128" dy="14">quantidade_litros +</tspan>
      <tspan x="128" dy="14">(quantidade_litros *</tspan>
      <tspan x="128" dy="14">percentual_aumento)</tspan>
    </text>
    <circle cx="128" cy="715" r="9" fill="#ffffff" stroke="#000000" stroke-width="1.5" filter="url(#drawio-shadow)" />
    <text x="128" y="719" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif">1</text>
  </g>
</svg>
