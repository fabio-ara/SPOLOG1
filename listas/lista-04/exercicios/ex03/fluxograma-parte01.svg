  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="296" y="53.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">Início</tspan>
    </text>
    <text x="296" y="154.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">&quot;Informe o peso em</tspan>
      <tspan x="296" dy="14">kg: &quot;</tspan>
    </text>
    <text x="296" y="269.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">peso</tspan>
    </text>
    <text x="296" y="370.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">&quot;Informe a altura</tspan>
      <tspan x="296" dy="14">em metros: &quot;</tspan>
    </text>
    <text x="296" y="485.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">altura</tspan>
    </text>
    <text x="296" y="593.2" text-anchor="middle" font-size="12">
      <tspan x="296" dy="0">altura &lt;= 0?</tspan>
    </text>
    <text x="104" y="701.2" text-anchor="middle" font-size="12">
      <tspan x="104" dy="0">&quot;Altura inválida.&quot;</tspan>
    </text>
    <text x="1000.42" y="694.2" text-anchor="middle" font-size="12">
      <tspan x="1000.42" dy="0">imc &lt;- peso /</tspan>
      <tspan x="1000.42" dy="14">(altura * altura)</tspan>
    </text>
    <text x="1000.42" y="802.2" text-anchor="middle" font-size="12">
      <tspan x="1000.42" dy="0">&quot;Peso digitado: &quot; +</tspan>
      <tspan x="1000.42" dy="14">peso + &quot; kg&quot;</tspan>
    </text>
    <text x="1000.42" y="910.2" text-anchor="middle" font-size="12">
      <tspan x="1000.42" dy="0">&quot;IMC calculado: &quot; +</tspan>
      <tspan x="1000.42" dy="14">imc</tspan>
    </text>
    <text x="1000.42" y="1025.2" text-anchor="middle" font-size="12">
      <tspan x="1000.42" dy="0">imc &lt;= 18.5?</tspan>
    </text>
    <text x="1123.3" y="1126.2" text-anchor="middle" font-size="12">
      <tspan x="1123.3" dy="0">classificacao &lt;-</tspan>
      <tspan x="1123.3" dy="14">&quot;baixo peso&quot;</tspan>
    </text>
    <text x="877.54" y="1133.2" text-anchor="middle" font-size="12">
      <tspan x="877.54" dy="0">imc &lt;= 24.9?</tspan>
    </text>
    <text x="1000.42" y="1227.2" text-anchor="middle" font-size="12">
      <tspan x="1000.42" dy="0">classificacao &lt;-</tspan>
      <tspan x="1000.42" dy="14">&quot;eutrofia (peso</tspan>
      <tspan x="1000.42" dy="14">adequado)&quot;</tspan>
    </text>
    <text x="754.66" y="1241.2" text-anchor="middle" font-size="12">
      <tspan x="754.66" dy="0">imc &lt;= 29.9?</tspan>
    </text>
    <text x="877.54" y="1342.2" text-anchor="middle" font-size="12">
      <tspan x="877.54" dy="0">classificacao &lt;-</tspan>
      <tspan x="877.54" dy="14">&quot;sobrepeso&quot;</tspan>
    </text>
    <text x="631.78" y="1349.2" text-anchor="middle" font-size="12">
      <tspan x="631.78" dy="0">imc &lt;= 34.9?</tspan>
    </text>
