  <g fill="#000000" font-family="Helvetica, Arial, sans-serif">
    <text x="1402.66" y="64.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">Início</tspan>
    </text>
    <text x="1402.66" y="187.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">casados &lt;- 0</tspan>
      <tspan x="1402.66" dy="14">solteiros &lt;- 0</tspan>
      <tspan x="1402.66" dy="14">viuvos &lt;- 0</tspan>
      <tspan x="1402.66" dy="14">outros &lt;- 0</tspan>
    </text>
    <text x="1402.66" y="345.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">&quot;Informe, a seguir, o estado</tspan>
      <tspan x="1402.66" dy="14">civil de 20 pessoas.&quot;</tspan>
    </text>
    <text x="1402.66" y="482.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">&quot;Opções: casado(a),</tspan>
      <tspan x="1402.66" dy="14">solteiro(a), viúvo(a) ou</tspan>
      <tspan x="1402.66" dy="14">outros.)&quot;</tspan>
    </text>
    <text x="1402.66" y="640.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">pessoa &lt;- 1, 20, 1</tspan>
    </text>
    <text x="1402.66" y="784.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">estado_civil</tspan>
    </text>
    <text x="1402.66" y="907.45" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">estado_civil =</tspan>
      <tspan x="1402.66" dy="14">&quot;casado&quot;</tspan>
      <tspan x="1402.66" dy="14">ou estado_civil =</tspan>
      <tspan x="1402.66" dy="14">&quot;casada&quot;?</tspan>
    </text>
    <text x="1732.66" y="1072.45" text-anchor="middle" font-size="12">
      <tspan x="1732.66" dy="0">casados &lt;- casados + 1</tspan>
    </text>
    <text x="804.33" y="1051.45" text-anchor="middle" font-size="12">
      <tspan x="804.33" dy="0">estado_civil =</tspan>
      <tspan x="804.33" dy="14">&quot;solteiro&quot;</tspan>
      <tspan x="804.33" dy="14">ou estado_civil =</tspan>
      <tspan x="804.33" dy="14">&quot;solteira&quot;?</tspan>
    </text>
    <text x="1072.66" y="1216.45" text-anchor="middle" font-size="12">
      <tspan x="1072.66" dy="0">solteiros &lt;- solteiros + 1</tspan>
    </text>
    <text x="367.04" y="1174.45" text-anchor="middle" font-size="12">
      <tspan x="367.04" dy="0">estado_civil = &quot;viúvo&quot;</tspan>
      <tspan x="367.04" dy="14">ou estado_civil =</tspan>
      <tspan x="367.04" dy="14">&quot;viuvo&quot;</tspan>
      <tspan x="367.04" dy="14">ou estado_civil =</tspan>
      <tspan x="367.04" dy="14">&quot;viúva&quot;</tspan>
      <tspan x="367.04" dy="14">ou estado_civil =</tspan>
      <tspan x="367.04" dy="14">&quot;viuva&quot;?</tspan>
    </text>
    <text x="536" y="1360.45" text-anchor="middle" font-size="12">
      <tspan x="536" dy="0">viuvos &lt;- viuvos + 1</tspan>
    </text>
    <text x="198.08" y="1360.45" text-anchor="middle" font-size="12">
      <tspan x="198.08" dy="0">outros &lt;- outros + 1</tspan>
    </text>
    <text x="1402.66" y="1864.9" text-anchor="middle" font-size="12">
      <tspan x="1402.66" dy="0">percentual_casados &lt;- casados</tspan>
      <tspan x="1402.66" dy="14">* 100 / 20</tspan>
      <tspan x="1402.66" dy="14">percentual_solteiros &lt;-</tspan>
      <tspan x="1402.66" dy="14">solteiros * 100 / 20</tspan>
    </text>
